<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Administrator Login - NEU Library System</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#17cf73",
                        "background-light": "#f6f8f7",
                        "background-dark": "#112119",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<!-- Main Layout Container -->
<div class="layout-container flex h-full grow flex-col">
<!-- Navbar / Header Area -->
<header class="flex items-center justify-between px-6 py-4 lg:px-20">
<div class="flex items-center gap-3">
<img alt="NEU Library System Logo" class="h-10 w-auto" data-alt="Official logo of Northeastern University Library" src="https://lh3.googleusercontent.com/aida/ADBb0ujdTTLXb03VnMlA_Ze8sMqHHhH8oH-EiLw3uaNzYqsg_PN845TFSu_G5ydJZRq4YOqGa_MoSOoqdNvqKj7ClELgWVuiFD47uGFUETX2iASaLSzidOGjxCyJJAYq0bt_hH3jU7BGt26h39M857aWsnhUSHVh5lQeojMpcdzRjSuG1scINbYonxL2dzQdpv1gXMyLxvvELt3kNYxN5lbsVQ7YGn92qPKkR7rrW3n5AC2qdPiUXu_SaDjT-BmeKV9dqRj7AVBneNSEPTI"/>
<span class="text-xl font-bold tracking-tight text-slate-900 dark:text-slate-100">NEU Library</span>
</div>
<a class="flex items-center gap-2 text-sm font-medium text-primary hover:opacity-80 transition-opacity" href="#">
<span class="material-symbols-outlined text-sm">arrow_back</span>
                Back to Welcome
            </a>
</header>
<!-- Login Content Section -->
<main class="flex flex-1 items-center justify-center p-4 lg:p-8">
<div class="w-full max-w-[1000px] flex flex-col lg:flex-row bg-white dark:bg-slate-900 rounded-xl overflow-hidden shadow-2xl border border-primary/10">
<!-- Left Side: Visual/Background -->
<div class="hidden lg:block lg:w-1/2 relative bg-primary/10">
<div class="absolute inset-0 bg-cover bg-center" data-alt="Modern university campus view" style="background-image: url('https://lh3.googleusercontent.com/aida/ADBb0ujljYUSezZBEBZnLAgK_Dpz4Q8vgZcVu3yYK_4Hcpj8PRzRWIqe20oBqQMSomyQeWaTtJu-xHSdC9hPZIb0vYq-SJ6WbcbbDX6xXj-afculiLPIjfNT5pHfpx1RZ2fshKU2vW7O-jg9MQv7SZAIXVkQr5w4jD98IPYz2Y42RaTZ_JiyogiLucNxUOrBGq6SUcVP78NkpEJspGoorej8wr64oUtR9MYYWTIkx3yP5SjISZAQspGjyNKvJpdxSiOxG0vh0gSB4ST4z54');">
<div class="absolute inset-0 bg-gradient-to-t from-background-dark/80 to-transparent"></div>
</div>
<div class="absolute bottom-10 left-10 right-10">
<h2 class="text-white text-3xl font-black leading-tight">Empowering knowledge, one login at a time.</h2>
<p class="text-primary mt-2 font-medium">Internal Administration Portal</p>
</div>
</div>
<!-- Right Side: Login Form -->
<div class="w-full lg:w-1/2 p-8 lg:p-12 flex flex-col justify-center">
<div class="mb-8">
<h1 class="text-3xl font-black text-slate-900 dark:text-white mb-2">Administrator Login</h1>
<p class="text-slate-500 dark:text-slate-400">Access the library management system portal</p>
</div>
<form class="space-y-6">
<!-- Username Field -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Username or Institutional Email</label>
<div class="relative">
<input class="w-full rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 p-4 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-400" placeholder="Enter your email or username" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Password</label>
<a class="text-xs text-primary font-medium hover:underline" href="#">Forgot password?</a>
</div>
<div class="relative flex items-center">
<input class="w-full rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 p-4 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-400" placeholder="Enter your password" type="password"/>
<button class="absolute right-4 text-slate-400 hover:text-primary" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Remember Me Toggle -->
<div class="flex items-center gap-2">
<input class="w-4 h-4 rounded border-slate-300 text-primary focus:ring-primary" id="remember" type="checkbox"/>
<label class="text-sm text-slate-600 dark:text-slate-400" for="remember">Stay signed in for 30 days</label>
</div>
<!-- Sign In Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-background-dark font-bold py-4 rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined">login</span>
</button>
</form>
<!-- Support Footer -->
<div class="mt-10 pt-8 border-t border-slate-100 dark:border-slate-800 flex flex-col sm:flex-row items-center justify-between gap-4">
<p class="text-xs text-slate-400">© 2023 NEU Library System</p>
<div class="flex gap-4">
<a class="text-xs text-slate-500 hover:text-primary transition-colors" href="#">Support</a>
<a class="text-xs text-slate-500 hover:text-primary transition-colors" href="#">Privacy Policy</a>
</div>
</div>
</div>
</div>
</main>
<!-- Bottom Margin for Balance -->
<footer class="py-6 text-center lg:hidden">
<a class="text-sm font-medium text-primary flex items-center justify-center gap-1" href="#">
<span class="material-symbols-outlined text-sm">arrow_back</span>
                Back to Welcome
            </a>
</footer>
</div>
</div>
</body></html>
